<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="jakarta.faces.html"
                xmlns:f="jakarta.faces.core"
                xmlns:ui="jakarta.faces.facelets"
                xmlns:p="http://primefaces.org/ui"
                template="/WEB-INF/template.xhtml">
    <ui:define name="content">
        <div class="panel">
            <h1>Inventory</h1>
            <div class="top-link">
                <h:link outcome="form" value="+ Add Product"/>
            </div>

            <h:form id="tableForm">
                <p:dataTable value="#{inventoryBean.products}" var="product"
                             emptyMessage="No products yet.">
                    <p:column headerText="Name">
                        <h:outputText value="#{product.name}"/>
                    </p:column>
                    <p:column headerText="Category">
                        <h:outputText value="#{product.category}"/>
                    </p:column>
                    <p:column headerText="Quantity">
                        <h:outputText value="#{product.quantity}"/>
                    </p:column>
                    <p:column headerText="Unit Price">
                        <h:outputText value="#{product.price}">
                            <f:convertNumber type="currency" currencySymbol="UGX "/>
                        </h:outputText>
                    </p:column>
                    <p:column headerText="">
                        <p:commandButton value="Remove" styleClass="btn-sm" ajax="false"
                                          action="#{inventoryBean.removeProduct(product)}"/>
                    </p:column>
                </p:dataTable>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
